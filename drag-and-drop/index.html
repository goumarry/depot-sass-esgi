<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plugin Tailwind : Chutier Drag & Drop</title>
    <link href="style.css" rel="stylesheet">
</head>
<body class="bg-gray-100 p-8 font-sans">

<div class="max-w-4xl mx-auto space-y-8">
    <div>
        <h1 class="text-3xl font-bold text-gray-800">Gestion des Produits</h1>
        <p class="text-gray-600">Glissez les produits du chutier vers les zones (et inversement). L'état est sauvegardé automatiquement !</p>
    </div>

    <div class="tw-dnd-container">

        <div class="w-1/2">
            <h2 class="font-semibold text-gray-700 mb-2">📥 Chutier (Réserve)</h2>
            <div class="tw-chutier" id="chutier" data-zone="chutier"></div>
        </div>

        <div class="w-1/2 tw-dropzones">
            <div>
                <h2 class="font-semibold text-gray-700 mb-2">🎯 Zone 1 (Priorité Haute)</h2>
                <div class="tw-dropzone" data-zone="1"></div>
            </div>
            <div>
                <h2 class="font-semibold text-gray-700 mb-2">🎯 Zone 2 (Priorité Moyenne)</h2>
                <div class="tw-dropzone" data-zone="2"></div>
            </div>
            <div>
                <h2 class="font-semibold text-gray-700 mb-2">🎯 Zone 3 (À archiver)</h2>
                <div class="tw-dropzone" data-zone="3"></div>
            </div>
        </div>

    </div>
</div>

<script src="data.js"></script>
<script src="main.js"></script>
</body>
</html>
